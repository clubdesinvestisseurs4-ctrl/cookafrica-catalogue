services:
  - type: web
    name: cookafrica-catalogue-api
    env: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Remplir manuellement dans le dashboard Render, AVEC LES MÊMES VALEURS que sur
      # Cloud Run (secrets GitHub) — notamment JWT_SECRET, qui doit être IDENTIQUE sur les
      # deux hébergeurs pour que les sessions admin/promoteur restent valides quel que soit
      # le backend actif (redondance Render <-> Cloud Run) :
      # - key: FIREBASE_PROJECT_ID
      # - key: FIREBASE_CLIENT_EMAIL
      # - key: FIREBASE_PRIVATE_KEY
      # - key: ADMIN_PASSWORD
      # - key: JWT_SECRET
      # - key: CORS_ORIGINS
